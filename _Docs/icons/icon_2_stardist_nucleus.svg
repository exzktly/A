<?xml version="1.0" encoding="UTF-8"?>
<!--
  All-Well icon concept 2: "StarDist Nucleus"
  A single glowing nucleus enclosed in a StarDist-style star polygon, sitting
  inside a circular well. Represents the segmentation pipeline's core output:
  per-nucleus quantification.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg2" cx="0.5" cy="0.35" r="0.9">
      <stop offset="0" stop-color="#1a2e25"/>
      <stop offset="1" stop-color="#060b09"/>
    </radialGradient>
    <radialGradient id="wellGrad" cx="0.5" cy="0.45" r="0.55">
      <stop offset="0" stop-color="#0f1f1a"/>
      <stop offset="1" stop-color="#070d0b"/>
    </radialGradient>
    <radialGradient id="nucleusGrad" cx="0.5" cy="0.45" r="0.6">
      <stop offset="0" stop-color="#e8ffd6"/>
      <stop offset="0.55" stop-color="#8ae86b"/>
      <stop offset="1" stop-color="#2f8a3d"/>
    </radialGradient>
    <filter id="nucGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Squircle background -->
  <rect x="72" y="72" width="880" height="880" rx="200" ry="200" fill="url(#bg2)"/>
  <rect x="72" y="72" width="880" height="880" rx="200" ry="200" fill="none" stroke="#1e3a2e" stroke-width="3"/>

  <!-- Well (the dark circular chamber) -->
  <circle cx="512" cy="480" r="320" fill="url(#wellGrad)" stroke="#274336" stroke-width="6"/>
  <!-- Meniscus highlight -->
  <ellipse cx="512" cy="360" rx="230" ry="28" fill="#1a3329" opacity="0.6"/>

  <!-- Star polygon (StarDist-style 32-ray outline around the nucleus) -->
  <!--
    Generated as alternating long/short radii around (512,480).
    Long: 290, Short: 230. Slightly jittered to feel organic.
  -->
  <polygon points="
    512,190   540,250   576,232   580,292   626,282   612,338
    660,344   626,394   678,416   628,444   674,484   614,490
    650,538   590,534   604,590   550,570   550,634   506,596
    478,654   452,594   400,622   402,566   348,574   380,526
    324,508   372,472   318,438   380,420   348,366   402,378
    390,318   446,334   446,276   486,310"
    fill="none" stroke="#cffcb4" stroke-width="4" stroke-linejoin="round" opacity="0.85"/>

  <!-- Inner nucleus -->
  <g filter="url(#nucGlow)">
    <ellipse cx="495" cy="478" rx="160" ry="150" fill="url(#nucleusGrad)"/>
  </g>
  <!-- Chromatin texture: a few faint speckles -->
  <g fill="#ffffff" opacity="0.35">
    <circle cx="450" cy="430" r="6"/>
    <circle cx="510" cy="448" r="5"/>
    <circle cx="550" cy="492" r="7"/>
    <circle cx="470" cy="510" r="4"/>
    <circle cx="520" cy="540" r="6"/>
    <circle cx="430" cy="472" r="3"/>
  </g>

  <!-- Ring tick marks indicating wells around the perimeter of the plate idea -->
  <g stroke="#3a6b54" stroke-width="4" opacity="0.6">
    <line x1="512" y1="140" x2="512" y2="170"/>
    <line x1="884" y1="480" x2="854" y2="480"/>
    <line x1="512" y1="820" x2="512" y2="790"/>
    <line x1="140" y1="480" x2="170" y2="480"/>
  </g>

  <!-- Wordmark -->
  <text x="512" y="900" font-family="-apple-system, SF Pro Display, Helvetica, Arial, sans-serif"
        font-weight="700" font-size="72" fill="#e6ffd9" text-anchor="middle" letter-spacing="4">ALL-WELL</text>
</svg>
