<?xml version="1.0" encoding="UTF-8"?>
<!--
  All-Well icon concept 1: "Plate Grid" (A W edition)
  The signature 8x12 96-well plate. Lit wells spell A W — the initials of
  "All Well" — using the three fluorescence channels (DAPI blue, GFP green,
  mCherry red) as a vertical spectrum: blue rows at top, green in the middle,
  red at the bottom, with cyan (B+G) and yellow (G+R) mixing rows between.
  The exact centre well, where the A's crossbar and the plate's centre meet,
  glows white to evoke all three channels combined — a nod to "All" in the
  app name.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b2740"/>
      <stop offset="1" stop-color="#0b1220"/>
    </linearGradient>
    <!-- Fluorescence channel gradients (centre-hot, rim-darker) -->
    <radialGradient id="blue" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#9ec7ff"/>
      <stop offset="1" stop-color="#2a6bd8"/>
    </radialGradient>
    <radialGradient id="cyan" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#c6fff4"/>
      <stop offset="1" stop-color="#1bb3b3"/>
    </radialGradient>
    <radialGradient id="green" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#c8ffb0"/>
      <stop offset="1" stop-color="#2aa84a"/>
    </radialGradient>
    <radialGradient id="yellow" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#ffffc2"/>
      <stop offset="1" stop-color="#d4b616"/>
    </radialGradient>
    <radialGradient id="red" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#ffc4c4"/>
      <stop offset="1" stop-color="#d83b3b"/>
    </radialGradient>
    <radialGradient id="white" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.6" stop-color="#f3f6ff"/>
      <stop offset="1" stop-color="#c8d4ff"/>
    </radialGradient>
    <radialGradient id="empty" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#2a3858"/>
      <stop offset="1" stop-color="#111a2e"/>
    </radialGradient>
    <!-- Soft glow for lit wells to sell the fluorescence read-out -->
    <filter id="lit" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded squircle background (macOS app-icon safe area) -->
  <rect x="72" y="72" width="880" height="880" rx="200" ry="200" fill="url(#bg1)"/>
  <rect x="72" y="72" width="880" height="880" rx="200" ry="200" fill="none" stroke="#2f3e63" stroke-width="3"/>

  <!-- Plate body -->
  <rect x="140" y="220" width="744" height="584" rx="36" ry="36" fill="#eef2f8"/>
  <rect x="140" y="220" width="744" height="584" rx="36" ry="36" fill="none" stroke="#c2ccda" stroke-width="4"/>
  <!-- Notch top-left, like real plates -->
  <path d="M 140 256 Q 140 220 176 220 L 240 220 L 240 256 Z" fill="#dde3ed"/>

  <!--
    96 wells at (cols 200..816 step 56) x (rows 276..724 step 64).
    All wells drawn; the "empty" fill is dim so the letter shapes read loudly.
  -->
  <g id="wells">
    <!-- row A (y=276) — blue band, A apex + W tops -->
    <circle cx="200" cy="276" r="22" fill="url(#empty)"/>
    <circle cx="256" cy="276" r="22" fill="url(#empty)"/>
    <circle cx="312" cy="276" r="22" fill="url(#blue)" filter="url(#lit)"/>
    <circle cx="368" cy="276" r="22" fill="url(#empty)"/>
    <circle cx="424" cy="276" r="22" fill="url(#empty)"/>
    <circle cx="480" cy="276" r="22" fill="url(#empty)"/>
    <circle cx="536" cy="276" r="22" fill="url(#blue)" filter="url(#lit)"/>
    <circle cx="592" cy="276" r="22" fill="url(#empty)"/>
    <circle cx="648" cy="276" r="22" fill="url(#empty)"/>
    <circle cx="704" cy="276" r="22" fill="url(#empty)"/>
    <circle cx="760" cy="276" r="22" fill="url(#empty)"/>
    <circle cx="816" cy="276" r="22" fill="url(#blue)" filter="url(#lit)"/>

    <!-- row B (y=340) — blue band -->
    <circle cx="200" cy="340" r="22" fill="url(#empty)"/>
    <circle cx="256" cy="340" r="22" fill="url(#blue)" filter="url(#lit)"/>
    <circle cx="312" cy="340" r="22" fill="url(#empty)"/>
    <circle cx="368" cy="340" r="22" fill="url(#blue)" filter="url(#lit)"/>
    <circle cx="424" cy="340" r="22" fill="url(#empty)"/>
    <circle cx="480" cy="340" r="22" fill="url(#empty)"/>
    <circle cx="536" cy="340" r="22" fill="url(#blue)" filter="url(#lit)"/>
    <circle cx="592" cy="340" r="22" fill="url(#empty)"/>
    <circle cx="648" cy="340" r="22" fill="url(#empty)"/>
    <circle cx="704" cy="340" r="22" fill="url(#empty)"/>
    <circle cx="760" cy="340" r="22" fill="url(#empty)"/>
    <circle cx="816" cy="340" r="22" fill="url(#blue)" filter="url(#lit)"/>

    <!-- row C (y=404) — cyan mix (blue + green) -->
    <circle cx="200" cy="404" r="22" fill="url(#empty)"/>
    <circle cx="256" cy="404" r="22" fill="url(#cyan)" filter="url(#lit)"/>
    <circle cx="312" cy="404" r="22" fill="url(#empty)"/>
    <circle cx="368" cy="404" r="22" fill="url(#cyan)" filter="url(#lit)"/>
    <circle cx="424" cy="404" r="22" fill="url(#empty)"/>
    <circle cx="480" cy="404" r="22" fill="url(#empty)"/>
    <circle cx="536" cy="404" r="22" fill="url(#cyan)" filter="url(#lit)"/>
    <circle cx="592" cy="404" r="22" fill="url(#empty)"/>
    <circle cx="648" cy="404" r="22" fill="url(#empty)"/>
    <circle cx="704" cy="404" r="22" fill="url(#empty)"/>
    <circle cx="760" cy="404" r="22" fill="url(#empty)"/>
    <circle cx="816" cy="404" r="22" fill="url(#cyan)" filter="url(#lit)"/>

    <!-- row D (y=468) — green band, A widens to outer legs -->
    <circle cx="200" cy="468" r="22" fill="url(#green)" filter="url(#lit)"/>
    <circle cx="256" cy="468" r="22" fill="url(#empty)"/>
    <circle cx="312" cy="468" r="22" fill="url(#empty)"/>
    <circle cx="368" cy="468" r="22" fill="url(#empty)"/>
    <circle cx="424" cy="468" r="22" fill="url(#green)" filter="url(#lit)"/>
    <circle cx="480" cy="468" r="22" fill="url(#empty)"/>
    <circle cx="536" cy="468" r="22" fill="url(#green)" filter="url(#lit)"/>
    <circle cx="592" cy="468" r="22" fill="url(#empty)"/>
    <circle cx="648" cy="468" r="22" fill="url(#empty)"/>
    <circle cx="704" cy="468" r="22" fill="url(#empty)"/>
    <circle cx="760" cy="468" r="22" fill="url(#empty)"/>
    <circle cx="816" cy="468" r="22" fill="url(#green)" filter="url(#lit)"/>

    <!-- row E (y=532) — A crossbar (green + centre white) -->
    <circle cx="200" cy="532" r="22" fill="url(#green)" filter="url(#lit)"/>
    <circle cx="256" cy="532" r="22" fill="url(#green)" filter="url(#lit)"/>
    <circle cx="312" cy="532" r="22" fill="url(#white)" filter="url(#lit)"/>
    <circle cx="368" cy="532" r="22" fill="url(#green)" filter="url(#lit)"/>
    <circle cx="424" cy="532" r="22" fill="url(#green)" filter="url(#lit)"/>
    <circle cx="480" cy="532" r="22" fill="url(#empty)"/>
    <circle cx="536" cy="532" r="22" fill="url(#green)" filter="url(#lit)"/>
    <circle cx="592" cy="532" r="22" fill="url(#empty)"/>
    <circle cx="648" cy="532" r="22" fill="url(#empty)"/>
    <circle cx="704" cy="532" r="22" fill="url(#empty)"/>
    <circle cx="760" cy="532" r="22" fill="url(#empty)"/>
    <circle cx="816" cy="532" r="22" fill="url(#green)" filter="url(#lit)"/>

    <!-- row F (y=596) — yellow mix (green + red); W's inner peaks appear -->
    <circle cx="200" cy="596" r="22" fill="url(#yellow)" filter="url(#lit)"/>
    <circle cx="256" cy="596" r="22" fill="url(#empty)"/>
    <circle cx="312" cy="596" r="22" fill="url(#empty)"/>
    <circle cx="368" cy="596" r="22" fill="url(#empty)"/>
    <circle cx="424" cy="596" r="22" fill="url(#yellow)" filter="url(#lit)"/>
    <circle cx="480" cy="596" r="22" fill="url(#empty)"/>
    <circle cx="536" cy="596" r="22" fill="url(#yellow)" filter="url(#lit)"/>
    <circle cx="592" cy="596" r="22" fill="url(#empty)"/>
    <circle cx="648" cy="596" r="22" fill="url(#yellow)" filter="url(#lit)"/>
    <circle cx="704" cy="596" r="22" fill="url(#yellow)" filter="url(#lit)"/>
    <circle cx="760" cy="596" r="22" fill="url(#empty)"/>
    <circle cx="816" cy="596" r="22" fill="url(#yellow)" filter="url(#lit)"/>

    <!-- row G (y=660) — red band; W's lower diagonal flares out -->
    <circle cx="200" cy="660" r="22" fill="url(#red)" filter="url(#lit)"/>
    <circle cx="256" cy="660" r="22" fill="url(#empty)"/>
    <circle cx="312" cy="660" r="22" fill="url(#empty)"/>
    <circle cx="368" cy="660" r="22" fill="url(#empty)"/>
    <circle cx="424" cy="660" r="22" fill="url(#red)" filter="url(#lit)"/>
    <circle cx="480" cy="660" r="22" fill="url(#empty)"/>
    <circle cx="536" cy="660" r="22" fill="url(#red)" filter="url(#lit)"/>
    <circle cx="592" cy="660" r="22" fill="url(#red)" filter="url(#lit)"/>
    <circle cx="648" cy="660" r="22" fill="url(#empty)"/>
    <circle cx="704" cy="660" r="22" fill="url(#empty)"/>
    <circle cx="760" cy="660" r="22" fill="url(#red)" filter="url(#lit)"/>
    <circle cx="816" cy="660" r="22" fill="url(#red)" filter="url(#lit)"/>

    <!-- row H (y=724) — red band; W's feet land -->
    <circle cx="200" cy="724" r="22" fill="url(#red)" filter="url(#lit)"/>
    <circle cx="256" cy="724" r="22" fill="url(#empty)"/>
    <circle cx="312" cy="724" r="22" fill="url(#empty)"/>
    <circle cx="368" cy="724" r="22" fill="url(#empty)"/>
    <circle cx="424" cy="724" r="22" fill="url(#red)" filter="url(#lit)"/>
    <circle cx="480" cy="724" r="22" fill="url(#empty)"/>
    <circle cx="536" cy="724" r="22" fill="url(#empty)"/>
    <circle cx="592" cy="724" r="22" fill="url(#red)" filter="url(#lit)"/>
    <circle cx="648" cy="724" r="22" fill="url(#empty)"/>
    <circle cx="704" cy="724" r="22" fill="url(#empty)"/>
    <circle cx="760" cy="724" r="22" fill="url(#red)" filter="url(#lit)"/>
    <circle cx="816" cy="724" r="22" fill="url(#empty)"/>
  </g>

  <!-- Wordmark chip -->
  <g>
    <rect x="348" y="830" width="328" height="82" rx="24" ry="24" fill="#0e1628" stroke="#3a4a70" stroke-width="2"/>
    <text x="512" y="886" font-family="-apple-system, SF Pro Display, Helvetica, Arial, sans-serif"
          font-weight="700" font-size="48" fill="#eaf0ff" text-anchor="middle" letter-spacing="2">ALL-WELL</text>
  </g>
</svg>
