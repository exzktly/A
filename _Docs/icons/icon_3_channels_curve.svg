<?xml version="1.0" encoding="UTF-8"?>
<!--
  All-Well icon concept 3: "Channels & Curve"
  Three overlapping fluorescence channel swatches (DAPI blue / GFP green /
  mCherry red) behind a CDF-style analysis curve crossing a dashed threshold
  line. Nods to the Review tab's line graphs, CDF threshold drag, and the
  multi-channel dropdown.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f9fd"/>
      <stop offset="1" stop-color="#dbe3f1"/>
    </linearGradient>
    <radialGradient id="cBlue" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#5aa0ff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#1d4fb0" stop-opacity="0.75"/>
    </radialGradient>
    <radialGradient id="cGreen" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#6fe08a" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#1e8f42" stop-opacity="0.75"/>
    </radialGradient>
    <radialGradient id="cRed" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ff8a8a" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#b42a2a" stop-opacity="0.75"/>
    </radialGradient>
  </defs>

  <!-- Squircle background -->
  <rect x="72" y="72" width="880" height="880" rx="200" ry="200" fill="url(#bg3)"/>
  <rect x="72" y="72" width="880" height="880" rx="200" ry="200" fill="none" stroke="#b9c4d8" stroke-width="3"/>

  <!-- Subtle inner card -->
  <rect x="140" y="170" width="744" height="620" rx="40" ry="40" fill="#ffffff" stroke="#cfd7e6" stroke-width="3"/>

  <!-- Three overlapping channel "beakers" (additive color circles) -->
  <g style="mix-blend-mode: multiply">
    <circle cx="400" cy="420" r="170" fill="url(#cBlue)"/>
    <circle cx="560" cy="420" r="170" fill="url(#cGreen)"/>
    <circle cx="480" cy="560" r="170" fill="url(#cRed)"/>
  </g>

  <!-- Plot axes -->
  <g stroke="#1c2740" stroke-width="6" stroke-linecap="round">
    <line x1="200" y1="720" x2="824" y2="720"/>
    <line x1="200" y1="720" x2="200" y2="240"/>
  </g>
  <!-- Axis ticks -->
  <g stroke="#4a5777" stroke-width="3">
    <line x1="200" y1="720" x2="200" y2="736"/>
    <line x1="356" y1="720" x2="356" y2="736"/>
    <line x1="512" y1="720" x2="512" y2="736"/>
    <line x1="668" y1="720" x2="668" y2="736"/>
    <line x1="824" y1="720" x2="824" y2="736"/>
    <line x1="200" y1="720" x2="184" y2="720"/>
    <line x1="200" y1="600" x2="184" y2="600"/>
    <line x1="200" y1="480" x2="184" y2="480"/>
    <line x1="200" y1="360" x2="184" y2="360"/>
    <line x1="200" y1="240" x2="184" y2="240"/>
  </g>

  <!-- Threshold dashed line (draggable in-app) -->
  <line x1="200" y1="440" x2="824" y2="440"
        stroke="#d83b3b" stroke-width="5" stroke-dasharray="14 12" opacity="0.85"/>
  <circle cx="824" cy="440" r="12" fill="#d83b3b"/>

  <!-- CDF-style analysis curve: S-curve from bottom-left to top-right -->
  <path d="M 200 720
           C 340 720, 420 700, 480 560
           C 520 460, 560 340, 700 280
           C 760 255, 800 250, 824 248"
        fill="none" stroke="#1c2740" stroke-width="10" stroke-linecap="round"/>

  <!-- Data points on the curve -->
  <g fill="#1c2740">
    <circle cx="300" cy="706" r="8"/>
    <circle cx="420" cy="640" r="8"/>
    <circle cx="500" cy="500" r="8"/>
    <circle cx="600" cy="360" r="8"/>
    <circle cx="720" cy="275" r="8"/>
  </g>

  <!-- Wordmark -->
  <text x="512" y="900" font-family="-apple-system, SF Pro Display, Helvetica, Arial, sans-serif"
        font-weight="700" font-size="72" fill="#1c2740" text-anchor="middle" letter-spacing="4">ALL-WELL</text>
</svg>
